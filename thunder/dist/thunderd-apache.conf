# Apache reverse-proxy fragment for thunderd (FEAT-305).
#
# thunderd binds loopback only; Apache terminates TLS and forwards the
# public namespace. Drop this inside the TLS <VirtualHost> and enable
# mod_proxy + mod_proxy_http:
#   a2enmod proxy proxy_http headers
#
# Replaces the old commerce CGI ScriptAlias block. The legacy custodial
# URLs are kept as transitional aliases (removed after cutover, FEAT-327/328).

# Canonical namespace — custodial + (later) non-custodial.
ProxyPass        /.well-known/thunder/v1  http://127.0.0.1:9737/.well-known/thunder/v1
ProxyPassReverse /.well-known/thunder/v1  http://127.0.0.1:9737/.well-known/thunder/v1

# Deprecated transitional aliases → forwarded to the same daemon so
# existing clients keep working during migration.
ProxyPass        /.well-known/lightning/accounts/v1  http://127.0.0.1:9737/.well-known/thunder/v1
ProxyPassReverse /.well-known/lightning/accounts/v1  http://127.0.0.1:9737/.well-known/thunder/v1

# Surface a deprecation hint on the alias.
<Location /.well-known/lightning/accounts/v1>
    Header always set Deprecation "true"
    Header always set Link "</.well-known/thunder/v1>; rel=\"successor-version\""
</Location>

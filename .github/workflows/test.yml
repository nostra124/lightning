name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bats sqlite3 jq python3 python3-pytest qrencode groff \
            shellcheck openssl xxd
      - name: bats unit tests
        run: bats tests/unit/
      - name: pytest (FEAT-196 CGI scripts)
        run: pytest tests/python/
      - name: shellcheck (merge gate)
        # 1.2.0 onward: shellcheck warnings are a hard fail. Run on
        # the full verb tree; CI fails if any new warnings appear.
        run: |
          shellcheck -S warning \
            bin/lightning \
            libexec/lightning/* \
            share/lightning/hooks/* \
            tests/sit/helpers.bash \
            share/doc/lightning/standards/refresh.sh

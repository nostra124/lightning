name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bats sqlite3 jq python3 python3-pytest qrencode groff \
            shellcheck openssl xxd
      - name: bats unit tests
        run: |
          set -o pipefail
          bats tests/unit/ 2>&1 | tee /tmp/ci-bats.log
      - name: pytest (FEAT-196 CGI scripts)
        run: |
          set -o pipefail
          pytest tests/python/ 2>&1 | tee /tmp/ci-pytest.log
      - name: shellcheck (merge gate)
        run: |
          set -o pipefail
          # libexec/lightning/ also holds Python helpers (FEAT-222 PR-3's
          # _webauthn-verify, _session-token) — filter to files with a
          # sh/bash shebang so shellcheck doesn't trip SC1071 on them.
          # Mirrors the same filter in the in-tree meta-test.
          files=(bin/lightning)
          for f in libexec/lightning/*; do
            [ -f "$f" ] || continue
            head -1 "$f" | grep -qE '^#!.*/(ba)?sh([[:space:]]|$)' && files+=("$f")
          done
          files+=(share/lightning/hooks/*)
          files+=(tests/sit/helpers.bash)
          files+=(share/doc/lightning/standards/refresh.sh)
          shellcheck -S warning "${files[@]}" 2>&1 | tee /tmp/ci-shellcheck.log
      # Diagnostic comment on failure — surfaces step output on the PR
      # so the actual failing test / assertion is visible without
      # opening the Actions UI.  Only fires on pull_request events
      # (push-to-master failures have no PR to comment on).
      - name: Post failure log to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            printf '## CI failure on `%s` (commit `%s`)\n\n' "$GITHUB_JOB" "${SHA:0:12}"
            printf 'Full run: %s\n\n' "$RUN_URL"
            for f in /tmp/ci-bats.log /tmp/ci-pytest.log /tmp/ci-shellcheck.log; do
              [ -f "$f" ] || continue
              name=$(basename "$f" .log | sed 's/^ci-//')
              # Show the tail — full bats output can be huge.  Reviewers
              # who want everything click the Full run link above.
              printf '<details><summary><code>%s</code> (last 200 lines)</summary>\n\n' "$name"
              printf '```\n'
              tail -n 200 "$f"
              printf '\n```\n\n</details>\n\n'
            done
          } > /tmp/ci-failure-comment.md
          gh pr comment "$PR" --repo "$REPO" --body-file /tmp/ci-failure-comment.md

  # thunderd — the Rust companion daemon (FEAT-300+). Standalone
  # workspace; built/checked independently of the bash package.
  thunderd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thunderd
    steps:
      - uses: actions/checkout@v4
      - name: install build deps (OpenSSL for webauthn-rs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config
      - name: install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal \
            --component rustfmt --component clippy
          rustup default stable
      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            thunderd/target
          key: cargo-${{ runner.os }}-${{ hashFiles('thunderd/Cargo.lock', 'thunderd/**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: carve-out guard (FEAT-302)
        run: ./scripts/carve-out-guard.sh
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --locked
      - name: test
        run: cargo test --locked

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: install test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bats sqlite3 jq python3 qrencode openssl xxd stow
      - name: install kcov build deps
        run: |
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config python3-pyelftools \
            libcurl4-openssl-dev libelf-dev libstdc++-12-dev \
            zlib1g-dev libdw-dev libiberty-dev binutils-dev libssl-dev
      - name: cache kcov binary
        id: kcov-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/kcov
            /usr/local/share/doc/kcov
            /usr/local/share/man/man1/kcov.1
          key: kcov-v43-${{ runner.os }}-${{ runner.arch }}
      - name: build kcov from source
        if: steps.kcov-cache.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -fsSL -o kcov.tgz https://github.com/SimonKagstrom/kcov/archive/refs/tags/v43.tar.gz
          tar xzf kcov.tgz
          cd kcov-43
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j"$(nproc)"
          sudo make install
      - name: configure
        run: ./configure --prefix="$HOME/.local"
      - name: run coverage
        run: make coverage
      - name: summarize coverage
        if: always()
        run: |
          {
            echo "## Coverage"
            if [ -f build/coverage/bats/coverage.json ]; then
              pct=$(jq -r .percent_covered build/coverage/bats/coverage.json)
              printf -- "- line coverage: **%s%%**\n" "$pct"
              echo "- target: 90%, climbing toward 100%"
            else
              echo "- coverage.json not produced; check the run-coverage step output"
            fi
            echo "- HTML report uploaded as artifact \`coverage-html\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage/
          retention-days: 14

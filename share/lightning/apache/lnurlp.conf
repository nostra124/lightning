# Apache vhost fragment for `lightning` (FEAT-176 + FEAT-196).
#
# Drop this inside your <VirtualHost> block, then:
#   sudo a2enmod cgi headers rewrite
#   sudo apachectl configtest && sudo systemctl reload apache2
#
# TLS termination is the operator's job; certbot is the easy
# path:
#   sudo apt install certbot python3-certbot-apache
#   sudo certbot --apache -d <your-domain>

# ---------------------------------------------------------------------------
# /.well-known/lnurlp/<user>  (FEAT-176 — LUD-16 Lightning Address)
# ---------------------------------------------------------------------------
ScriptAlias /.well-known/lnurlp/ \
    /usr/share/lightning/wellknown/lnurlp/handler.py/

<Directory /usr/share/lightning/wellknown/lnurlp>
    Options +ExecCGI
    SetHandler cgi-script
    Require all granted
</Directory>

# ---------------------------------------------------------------------------
# /.well-known/lightning/<user>/{send,recv,balance}  (FEAT-196 — JSON API)
# ---------------------------------------------------------------------------
# mod_rewrite routes the URL shape to the right endpoint script while
# preserving <user> in LIGHTNING_API_USER (which _lib.py reads).
RewriteEngine On
RewriteRule "^/.well-known/lightning/([a-z][a-z0-9_-]*)/(send|recv|balance)$" \
    "/usr/share/lightning/wellknown/lightning/$2.py" [L,E=LIGHTNING_API_USER:$1,PT]

ScriptAlias /usr/share/lightning/wellknown/lightning/ \
    /usr/share/lightning/wellknown/lightning/

<Directory /usr/share/lightning/wellknown/lightning>
    Options +ExecCGI
    SetHandler cgi-script
    # X-API-Key arrives as HTTP_X_API_KEY via mod_cgi by default.
    Require all granted
</Directory>

# ---------------------------------------------------------------------------
# /api/accounts/* (FEAT-212 — account-centric HTTP API)
# ---------------------------------------------------------------------------
# A single dispatcher script handles all eight routes (create,
# balance, topup, withdraw, pay, recv, recv-reusable, close).
# PATH_INFO preserves the <id>/<verb> tail.  Authorization: Bearer
# arrives as HTTP_AUTHORIZATION via mod_cgi by default.
#
# Rate-limiting is done at two layers:
#   * mod_ratelimit / mod_qos at this vhost (operator's choice;
#     see ratelimit_module docs for syntax — recommended cap is
#     6 req/min/IP on POST /api/accounts).
#   * lightning api-accounts-create verb keeps a rolling 60 s log
#     under $LIGHTNING_DIR/api-accounts.creates.log and enforces
#     LIGHTNING_ACCOUNT_CREATE_RATE.
ScriptAlias /api/accounts \
    /usr/share/lightning/wellknown/api/accounts.py

<Directory /usr/share/lightning/wellknown/api>
    Options +ExecCGI
    SetHandler cgi-script
    Require all granted
    # Forward REMOTE_ADDR to the verb so its rolling-log limiter
    # can key off the source IP.  PassEnv is a no-op for the
    # builtin CGI env vars (REMOTE_ADDR is always set); leaving
    # the directive in as a hint for operators behind a reverse
    # proxy who need to swap to X-Forwarded-For.
    # PassEnv HTTP_X_FORWARDED_FOR
</Directory>

# ---------------------------------------------------------------------------
# /api/mcp + /.well-known/lightning/mcp.json (FEAT-212 PR-3 — MCP for LLM agents)
# ---------------------------------------------------------------------------
# Tool surface mirrors /api/accounts/*.  Plain JSON-RPC 2.0 over
# HTTP POST — no SSE on this server, the calls are request/response.
ScriptAlias /api/mcp \
    /usr/share/lightning/wellknown/api/mcp.py

# Static manifest at /.well-known/lightning/mcp.json — lets agents
# discover the server without speaking the protocol first.
Alias /.well-known/lightning/mcp.json \
    /usr/share/lightning/wellknown/lightning/mcp.json
<Files mcp.json>
    Require all granted
</Files>

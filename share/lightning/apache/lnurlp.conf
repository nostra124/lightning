# Apache config snippet for Lightning Addresses (FEAT-176)
# Drop this into /etc/apache2/conf-available/lnurlp.conf and enable:
#   sudo a2enconf lnurlp && sudo systemctl reload apache2
#
# Alternatively, include from your vhost block:
#   Include /etc/apache2/conf-available/lnurlp.conf
#
# TLS is strongly recommended. See certbot: https://certbot.eff.org

ScriptAlias /.well-known/lnurlp/ \
    /usr/share/lightning/wellknown/lnurlp/handler.py/
<Directory /usr/share/lightning/wellknown/lnurlp>
    Options +ExecCGI
    SetHandler cgi-script
    Require all granted
</Directory>

# Ensure CGI scripts can find the lightning binary.
SetEnv LIGHTNING_BIN /usr/local/bin/lightning
SetEnv ALICE_USER alice
SetEnv SUDO_CMD sudo

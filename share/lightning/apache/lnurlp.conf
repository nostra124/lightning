# Apache vhost fragment for `lightning` (FEAT-176 + FEAT-196).
#
# Drop this inside your <VirtualHost> block, then:
#   sudo a2enmod cgi headers rewrite
#   sudo apachectl configtest && sudo systemctl reload apache2
#
# TLS termination is the operator's job; certbot is the easy
# path:
#   sudo apt install certbot python3-certbot-apache
#   sudo certbot --apache -d <your-domain>

# ---------------------------------------------------------------------------
# /.well-known/lnurlp/<user>  (FEAT-176 — LUD-16 Lightning Address)
# ---------------------------------------------------------------------------
ScriptAlias /.well-known/lnurlp/ \
    /usr/share/lightning/wellknown/lnurlp/handler.py/

<Directory /usr/share/lightning/wellknown/lnurlp>
    Options +ExecCGI
    SetHandler cgi-script
    Require all granted
</Directory>

# ---------------------------------------------------------------------------
# /.well-known/lightning/<user>/{send,recv,balance}  (FEAT-196 — JSON API)
# ---------------------------------------------------------------------------
# mod_rewrite routes the URL shape to the right endpoint script while
# preserving <user> in LIGHTNING_API_USER (which _lib.py reads).
RewriteEngine On
RewriteRule "^/.well-known/lightning/([a-z][a-z0-9_-]*)/(send|recv|balance)$" \
    "/usr/share/lightning/wellknown/lightning/$2.py" [L,E=LIGHTNING_API_USER:$1,PT]

ScriptAlias /usr/share/lightning/wellknown/lightning/ \
    /usr/share/lightning/wellknown/lightning/

<Directory /usr/share/lightning/wellknown/lightning>
    Options +ExecCGI
    SetHandler cgi-script
    # X-API-Key arrives as HTTP_X_API_KEY via mod_cgi by default.
    Require all granted
</Directory>

# ---------------------------------------------------------------------------
# /.well-known/lightning/v1/accounts/* (FEAT-212 account API; FEAT-224 move,
# FEAT-232 versioning)
# ---------------------------------------------------------------------------
# A single dispatcher handles all routes (create, balance, topup,
# withdraw, pay, recv, recv-reusable, transfer, referrals, close).
# The `/.well-known/lightning/v1/accounts` prefix is consumed by the
# ScriptAlias, so PATH_INFO still arrives as the `<id>/<verb>` tail —
# the dispatcher is unchanged by the move.  Authorization: Bearer
# arrives as HTTP_AUTHORIZATION via mod_cgi by default.
#
# Rate-limiting is done at two layers:
#   * mod_ratelimit / mod_qos at this vhost (operator's choice;
#     recommended cap 6 req/min/IP on POST .../v1/accounts).
#   * the api-accounts-create verb keeps a rolling 60 s log under
#     $LIGHTNING_DIR/api-accounts.creates.log + enforces
#     LIGHTNING_ACCOUNT_CREATE_RATE.
ScriptAlias /.well-known/lightning/v1/accounts \
    /usr/share/lightning/wellknown/api/accounts.py

ScriptAlias /.well-known/lightning/v1/mcp \
    /usr/share/lightning/wellknown/api/mcp.py

# FEAT-222 PR-3b — user-layer passkey + session API.  Dispatcher routes
# /<usr_id>/passkeys/{register,login}/{begin,finish}, /<usr_id>/passkeys
# (list, delete), and (PR-4) /<usr_id>/session/refresh.  Authorization:
# Bearer (session token minted on login-finish) arrives via
# HTTP_AUTHORIZATION.  The relying party MUST be configured in the
# surrounding <VirtualHost> — WebAuthn needs a stable RP-ID and an exact
# origin match, neither of which can be guessed server-side:
#   SetEnv LIGHTNING_RP_ID      example.com
#   SetEnv LIGHTNING_RP_ORIGIN  https://example.com
#   SetEnv LIGHTNING_RP_NAME    "Lightning Wallet"
ScriptAlias /.well-known/lightning/v1/users \
    /usr/share/lightning/wellknown/api/users.py

# FEAT-229 — public sat/fiat price (no auth).
ScriptAlias /.well-known/lightning/v1/price \
    /usr/share/lightning/wellknown/api/price.py

# FEAT-252 — public node info (pubkey, alias, channel count).
ScriptAlias /.well-known/lightning/v1/node \
    /usr/share/lightning/wellknown/api/node.py

# Catch-all for any OTHER version segment (e.g. /v2/...): a tiny gate
# script returns 404 {"error":"unknown_api_version"}.  Apache resolves
# ScriptAlias by longest prefix, so the v1 aliases above win for v1
# requests; only unknown-version paths fall through here.  (Placed
# after the specific aliases for readability; match length, not order,
# decides.)
ScriptAlias /.well-known/lightning/v \
    /usr/share/lightning/wellknown/api/version_gate.py

<Directory /usr/share/lightning/wellknown/api>
    Options +ExecCGI
    SetHandler cgi-script
    Require all granted
    # Forward REMOTE_ADDR to the verb so its rolling-log limiter
    # can key off the source IP.  PassEnv is a no-op for the
    # builtin CGI env vars (REMOTE_ADDR is always set); leaving
    # the directive in as a hint for operators behind a reverse
    # proxy who need to swap to X-Forwarded-For.
    # PassEnv HTTP_X_FORWARDED_FOR
</Directory>

# ---------------------------------------------------------------------------
# Discovery manifests under /.well-known/lightning/
# ---------------------------------------------------------------------------
# versions.json — advertises which API versions this node serves.
# mcp.json      — MCP server descriptor (FEAT-212 PR-3).
Alias /.well-known/lightning/versions.json \
    /usr/share/lightning/wellknown/lightning/versions.json
Alias /.well-known/lightning/mcp.json \
    /usr/share/lightning/wellknown/lightning/mcp.json
<Files "versions.json">
    Require all granted
</Files>
<Files "mcp.json">
    Require all granted
</Files>

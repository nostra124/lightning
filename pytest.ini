# pytest config for the FEAT-196 CGI scripts.
#
# The Python sources live in share/lightning/wellknown/. Make
# them importable so test files can `import balance`, `import
# send`, etc. — the scripts do their own argv/env-based work
# via if __name__ blocks, so importing them is safe in test.

[pytest]
testpaths = tests/python
pythonpath = share/lightning/wellknown/lightning share/lightning/wellknown/lnurlp
addopts = -ra --strict-markers
